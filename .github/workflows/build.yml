name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Regenerate android folder
        run: |
          rm -rf android
          flutter create --org com.lords --project-name lords_of_mirage --platforms=android .

      - name: Patch AndroidManifest for portrait + app label
        run: |
          sed -i 's|android:label="lords_of_mirage"|android:label="Lords of Mirage"|g' android/app/src/main/AndroidManifest.xml
          sed -i 's|<activity|<activity\n            android:screenOrientation="portrait"|1' android/app/src/main/AndroidManifest.xml

      - name: Bump compileSdk to 35 (required by audioplayers_android)
        run: |
          sed -i 's|compileSdk = flutter.compileSdkVersion|compileSdk = 35|g' android/app/build.gradle
          sed -i 's|compileSdk flutter.compileSdkVersion|compileSdk 35|g' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/lords-of-mirage.apk

      - name: Delete previous latest release
        run: gh release delete v-latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous latest tag
        run: git push origin --delete v-latest 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        run: |
          gh release create v-latest \
            --title "Lords of Mirage — Latest Build" \
            --notes "## Lords of Mirage (أسياد السراب)

          **Download:** tap \`lords-of-mirage.apk\` below and install on your Android device.

          **Requirements:** Android 6.0+ (API level 23)

          Built automatically from the latest commit on \`main\`." \
            build/app/outputs/flutter-apk/lords-of-mirage.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
