name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/lords-of-mirage.apk

      - name: Delete previous latest release
        run: gh release delete v-latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous latest tag
        run: git push origin --delete v-latest 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        run: |
          gh release create v-latest \
            --title "Lords of Mirage — Latest Build" \
            --notes "## Lords of Mirage (أسياد السراب)

          **Download:** tap \`lords-of-mirage.apk\` below and install on your Android device.

          **Requirements:** Android 6.0+ (API level 23)

          Built automatically from the latest commit on \`main\`." \
            build/app/outputs/flutter-apk/lords-of-mirage.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
